<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Test Powiadomień</title>
  </head>
  <body>
    <h1>Test Push API</h1>
    <button id="ask-permission-btn">Poproś o zgodę</button>
    <button id="send-notification-btn">Wyślij powiadomienie</button>

    <script>
      // Funkcja pytania o zgode
      const requestPermission = async () => {
        const status = await Notification.requestPermission();
        console.log("Permission status:", status);
      };

      const askBtn = document.getElementById("ask-permission-btn");
      askBtn.addEventListener("click", requestPermission);

      // Funkcja wysylania powiadomienia
      const sendNotification = () => {
        if (Notification.permission === "granted") {
          new Notification("Example notification", {
            body: "Notification sent successfully.",
          });
        } else {
          alert("Access denied!");
        }
      };

      const sendBtn = document.getElementById("send-notification-btn");
      sendBtn.addEventListener("click", sendNotification);
    </script>
  </body>
</html>
